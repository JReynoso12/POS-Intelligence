# Pushes SQL migrations in supabase/migrations/ to your linked Supabase project.
# Required GitHub secrets (repo → Settings → Secrets):
#   SUPABASE_ACCESS_TOKEN — from https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF   — Project ID (Settings → General → Reference ID)
#   SUPABASE_DB_PASSWORD   — Database password used when the project was created

name: Supabase migrations

on:
  push:
    branches: [main, master]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

concurrency:
  group: supabase-migrations-${{ github.ref }}
  cancel-in-progress: true

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project & push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -e
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          supabase db push
